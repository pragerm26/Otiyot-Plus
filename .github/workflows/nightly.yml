name: Nightly Build

# Runs every day at 02:00 UTC, or manually from the Actions tab
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get build info
        id: info
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "DATE=$DATE"               >> "$GITHUB_OUTPUT"
          echo "VERSION=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "SHA=$SHORT_SHA"            >> "$GITHUB_OUTPUT"
          echo "ZIP_NAME=otiyot-plus-nightly-${DATE}.zip" >> "$GITHUB_OUTPUT"

      # Vendor fontkit at build time (required by pdf-lib for custom OTF embedding)
      - name: Vendor fontkit
        run: |
          curl -sSL --fail \
            -o lib/fontkit.umd.min.js \
            https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js
          test -s lib/fontkit.umd.min.js

      - name: Build extension zip
        run: |
          ZIP_NAME="${{ steps.info.outputs.ZIP_NAME }}"

          zip -r "$ZIP_NAME" \
            manifest.json \
            popup.html \
            popup.js \
            content.js \
            pdf-processor.html \
            pdf-processor.js \
            icons/ \
            lib/ \
            fonts/

          echo "Built $ZIP_NAME ($(du -sh $ZIP_NAME | cut -f1))"

      # Delete the existing nightly release + tag so we can replace it cleanly
      - name: Delete previous nightly release (if exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          name: "Otiyot+ Nightly (${{ steps.info.outputs.DATE }})"
          tag_name: nightly
          body: |
            ## Nightly Build — ${{ steps.info.outputs.DATE }}

            > **This is an automated development build.** It reflects the latest commit on the default branch and may be unstable.
            > For a stable install use the [latest release](../../releases/latest).

            **Base version:** v${{ steps.info.outputs.VERSION }}
            **Commit:** `${{ steps.info.outputs.SHA }}`
            **Built:** ${{ steps.info.outputs.DATE }} at 02:00 UTC

            ---
            ### Install
            1. Download `${{ steps.info.outputs.ZIP_NAME }}` below
            2. Unzip anywhere on your computer
            3. Open Chrome → `chrome://extensions` → Enable **Developer mode**
            4. Click **Load unpacked** and select the unzipped folder
          files: ${{ steps.info.outputs.ZIP_NAME }}
          draft: false
          prerelease: true
